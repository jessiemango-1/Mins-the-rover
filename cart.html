<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let output = "";

if(cart.length === 0){
  output = "Your cart is empty.";
} else {
  cart.forEach(item => {
    output += "<p>" + item + "</p>";
  });
}

document.getElementById("cartItem").innerHTML = output;

function goCheckout(){
  window.location.href="checkout.html";
}
</script>
