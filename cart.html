<!DOCTYPE html>
<html>

nav { background:#1e3a8a; padding:15px; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

<nav>

<h1>Your Cart</h1>

<button onclick="goCheckout()">Checkout</button>

  window.location.href="checkout.html";
}
</script>
